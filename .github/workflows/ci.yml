name: CI + CD Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

jobs:
  # ── Backend CI ──
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-complexity=10 --max-line-length=127 --statistics

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln CVE-2025-71176

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DEBUG: "false"
        run: |
          pip install pytest-cov
          pytest -v --tb=short --cov=app --cov-fail-under=70

      - name: Build verification
        run: python -m compileall app

  # ── Frontend CI ──
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

  # ── Deploy to EC2 via Docker ──
  deploy:
    name: Deploy
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script_stop: true
          command_timeout: 30m
          script: |
            set -ex

            # ── Clone or pull project ──
            PROJECT_DIR="/home/ubuntu/beta"
            if [ -d "$PROJECT_DIR/.git" ]; then
              echo "Pulling latest code..."
              cd "$PROJECT_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              echo "Cloning repository..."
              rm -rf "$PROJECT_DIR"
              git clone https://github.com/SoftwareEcosystem-268/beta-packglow.git "$PROJECT_DIR"
              cd "$PROJECT_DIR"
            fi

            # ── Create backend .env ──
            echo "Writing backend/.env..."
            cat > backend/.env << ENVEOF
            APP_NAME=Pack&Glow API
            APP_VERSION=1.0.0
            DEBUG=false
            API_PREFIX=/api/v1
            DATABASE_URL=sqlite+aiosqlite:////app/data/packglow.db
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
            OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
            OPENROUTER_MODEL=openai/gpt-4.1-nano
            OPENROUTER_WEB_SEARCH=true
            FRONTEND_URL=http://labs89.hpc-ignite.org/beta-packglow
            ENVEOF

            # ── Build and run with Docker Compose ──
            echo "Stopping old containers..."
            docker compose down --remove-orphans || true
            echo "Building and starting containers..."
            export API_URL="http://labs89.hpc-ignite.org/beta-packglow/api/v1"
            export BASE_PATH="/beta-packglow"
            docker compose up --build -d

            # ── Wait for health checks ──
            echo "Waiting for services to be healthy..."
            sleep 15
            docker compose ps

            # ── Reload Nginx (config managed manually) ──
            echo "Reloading Nginx..."
            sudo nginx -t && sudo service nginx reload

            echo "Deploy complete!"
